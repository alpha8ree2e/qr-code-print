<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QR Code Auto Print</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
      :root {
        --bg: #f3f5f7;
        --panel: #ffffff;
        --ink: #15191f;
        --muted: #67717f;
        --line: #d9e0e8;
        --soft: #f8fafc;
        --accent: #0f766e;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: Arial, "Microsoft YaHei", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(360px, 460px) minmax(0, 1fr);
      }

      .controls {
        padding: 24px;
        background: var(--panel);
        border-right: 1px solid var(--line);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .sub {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
      }

      .scanBox {
        display: grid;
        gap: 9px;
        margin-bottom: 16px;
      }

      label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      #scanInput {
        width: 100%;
        min-height: 54px;
        border: 2px solid var(--accent);
        border-radius: 8px;
        padding: 10px 12px;
        background: #fff;
        color: var(--ink);
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 0;
        outline: none;
        text-transform: uppercase;
      }

      .status {
        min-height: 42px;
        padding: 10px 12px;
        border-radius: 8px;
        background: var(--soft);
        color: var(--muted);
        font-size: 14px;
        line-height: 1.4;
      }

      .status.ok {
        color: #075e54;
        background: #e7f6f2;
      }

      .status.warn {
        color: var(--danger);
        background: #fff1f0;
      }

      .settings {
        display: grid;
        gap: 10px;
        margin: 16px 0;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--soft);
      }

      .check {
        display: flex;
        align-items: center;
        gap: 9px;
        color: var(--ink);
        font-size: 14px;
        font-weight: 700;
      }

      .check input {
        width: 18px;
        height: 18px;
        accent-color: var(--accent);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 18px;
      }

      .btn {
        min-height: 40px;
        border-radius: 7px;
        background: #e6ebf0;
        color: var(--ink);
        font-weight: 800;
      }

      .btn.primary {
        background: var(--accent);
        color: #fff;
      }

      .historyTop {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }

      .historyTop h2 {
        margin: 0;
        font-size: 16px;
      }

      .count {
        color: var(--muted);
        font-size: 13px;
      }

      .history {
        display: grid;
        gap: 7px;
        max-height: calc(100vh - 390px);
        overflow: auto;
      }

      .row {
        display: grid;
        gap: 3px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .row strong,
      .row span {
        overflow-wrap: anywhere;
      }

      .row strong {
        font-size: 14px;
      }

      .row span {
        color: var(--muted);
        font-size: 12px;
      }

      .preview {
        min-width: 0;
        padding: 26px;
        display: grid;
        place-items: center;
      }

      .label {
        width: min(100%, 380px);
        aspect-ratio: 100 / 150;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 24px;
        background: #fff;
        border: 1px solid #c9d1dc;
        border-radius: 8px;
        box-shadow: 0 14px 40px rgba(23, 32, 42, 0.1);
      }

      #qr {
        width: 240px;
        height: 240px;
        display: grid;
        place-items: center;
      }

      #qr img,
      #qr canvas {
        width: 240px !important;
        height: 240px !important;
      }

      .generated {
        width: 100%;
        text-align: center;
        font-size: 23px;
        line-height: 1.15;
        font-weight: 900;
        letter-spacing: 0;
        overflow-wrap: anywhere;
      }

      .emptyQr {
        color: var(--muted);
        font-size: 15px;
        text-align: center;
      }

      @media (max-width: 820px) {
        .app {
          grid-template-columns: 1fr;
        }

        .controls {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .history {
          max-height: 180px;
        }
      }

      @page {
        size: 100mm 150mm;
        margin: 0;
      }

      @media print {
        html,
        body {
          width: 100mm;
          height: 150mm;
          margin: 0;
          background: #fff;
        }

        .controls {
          display: none !important;
        }

        .app,
        .preview {
          display: block;
          width: 100mm;
          height: 150mm;
          min-height: 0;
          padding: 0;
          margin: 0;
          background: #fff;
        }

        .label {
          width: 100mm;
          height: 150mm;
          aspect-ratio: auto;
          gap: 8mm;
          padding: 10mm 8mm;
          border: 0;
          border-radius: 0;
          box-shadow: none;
        }

        #qr {
          width: 68mm;
          height: 68mm;
        }

        #qr img,
        #qr canvas {
          width: 68mm !important;
          height: 68mm !important;
        }

        .generated {
          font-size: 6.2mm;
          line-height: 1.12;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="controls">
        <h1>扫码生成 R1 二维码</h1>
        <p class="sub">扫描枪输入单号后会自动识别，生成「单号-R1」二维码，并自动打开打印。</p>

        <div class="scanBox">
          <label for="scanInput">扫码输入</label>
          <input
            id="scanInput"
            autocomplete="off"
            autofocus
            inputmode="latin"
            placeholder="扫单号，停一下就会自动打印"
          />
          <div class="status" id="status">等待扫码...</div>
        </div>

        <div class="settings">
          <label class="check">
            <input id="autoPrint" type="checkbox" checked />
            扫码后自动打印
          </label>
          <label class="check">
            <input id="skipDuplicates" type="checkbox" checked />
            连续重复单号不重复打印
          </label>
        </div>

        <div class="actions">
          <button class="btn primary" id="printNow" type="button">打印当前</button>
          <button class="btn" id="clearHistory" type="button">清空记录</button>
        </div>

        <div class="historyTop">
          <h2>记录</h2>
          <span class="count" id="count">0 张</span>
        </div>
        <div class="history" id="history"></div>
      </section>

      <section class="preview" aria-label="打印预览">
        <article class="label" id="label">
          <div id="qr"><div class="emptyQr">等待生成二维码</div></div>
          <div class="generated" id="generated">-</div>
        </article>
      </section>
    </main>

    <script>
      const WAYBILL_RE = /[a-zA-Z0-9]{8,30}/g;
      const scanInput = document.querySelector("#scanInput");
      const statusEl = document.querySelector("#status");
      const autoPrint = document.querySelector("#autoPrint");
      const skipDuplicates = document.querySelector("#skipDuplicates");
      const printNow = document.querySelector("#printNow");
      const clearHistory = document.querySelector("#clearHistory");
      const historyEl = document.querySelector("#history");
      const countEl = document.querySelector("#count");
      const qrEl = document.querySelector("#qr");
      const generatedEl = document.querySelector("#generated");

      let debounceTimer = null;
      let printTimer = null;
      let current = null;
      let lastPrintedSource = "";
      let history = [];

      function extractWaybill(raw) {
        const matches = String(raw || "").match(WAYBILL_RE) || [];
        return matches[0] ? matches[0].toUpperCase() : "";
      }

      function setStatus(text, type = "") {
        statusEl.textContent = text;
        statusEl.className = "status" + (type ? " " + type : "");
      }

      function focusScanner() {
        window.setTimeout(() => {
          scanInput.focus();
          scanInput.select();
        }, 80);
      }

      function renderQr(value) {
        qrEl.innerHTML = "";

        if (!window.QRCode) {
          qrEl.innerHTML = '<div class="emptyQr">二维码库未加载，请联网后刷新页面</div>';
          return false;
        }

        new QRCode(qrEl, {
          text: value,
          width: 240,
          height: 240,
          correctLevel: QRCode.CorrectLevel.M,
        });
        return true;
      }

      function renderHistory() {
        countEl.textContent = history.length + " 张";
        historyEl.innerHTML = history
          .slice(0, 80)
          .map(
            (item) =>
              '<div class="row"><strong>' +
              item.generated +
              '</strong><span>原单号：' +
              item.source +
              " · " +
              item.time +
              "</span></div>",
          )
          .join("");
      }

      function printCurrent() {
        if (!current) {
          setStatus("还没有可打印的二维码", "warn");
          focusScanner();
          return;
        }
        window.clearTimeout(printTimer);
        printTimer = window.setTimeout(() => {
          window.print();
          focusScanner();
        }, 260);
      }

      function processScan(raw, force = false) {
        const source = extractWaybill(raw);

        if (!source) {
          if (force || String(raw || "").trim()) {
            setStatus("未识别到标准单号：需要 8-30 位字母或数字", "warn");
          }
          focusScanner();
          return;
        }

        if (skipDuplicates.checked && source === lastPrintedSource) {
          scanInput.value = "";
          setStatus("已跳过连续重复单号：" + source, "warn");
          focusScanner();
          return;
        }

        const generated = source + "-R1";
        current = { source, generated };
        generatedEl.textContent = generated;

        if (!renderQr(generated)) {
          setStatus("二维码库未加载，无法生成二维码", "warn");
          return;
        }

        lastPrintedSource = source;
        history.unshift({
          source,
          generated,
          time: new Date().toLocaleTimeString("zh-CN", { hour12: false }),
        });
        renderHistory();

        scanInput.value = "";
        setStatus("已生成：" + generated + (autoPrint.checked ? "，正在打开打印..." : ""), "ok");

        if (autoPrint.checked) {
          printCurrent();
        } else {
          focusScanner();
        }
      }

      scanInput.addEventListener("input", () => {
        window.clearTimeout(debounceTimer);
        debounceTimer = window.setTimeout(() => processScan(scanInput.value), 180);
      });

      scanInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === "Tab") {
          event.preventDefault();
          window.clearTimeout(debounceTimer);
          processScan(scanInput.value, true);
        }
      });

      printNow.addEventListener("click", printCurrent);

      clearHistory.addEventListener("click", () => {
        history = [];
        renderHistory();
        setStatus("记录已清空，继续等待扫码...");
        focusScanner();
      });

      window.addEventListener("click", (event) => {
        if (event.target !== scanInput) focusScanner();
      });

      window.addEventListener("afterprint", focusScanner);

      renderHistory();
      focusScanner();
    </script>
  </body>
</html>
